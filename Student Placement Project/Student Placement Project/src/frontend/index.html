<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Placement Predictor</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="wrapper">
    <header class="header">
      <p class="eyebrow">Placement Intelligence</p>
      <h1 class="title">Student Placement Predictor</h1>
      <p class="subtitle">
        Enter student metrics below to run a live prediction<br />
        from your trained ML model.
      </p>
    </header>

    <div class="card">
      <p class="card-title">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-2a4 4 0 014-4h0a4 4 0 014 4v2M12 3a4 4 0 110 8 4 4 0 010-8z"/>
        </svg>
        Predict Placement
      </p>

      <form id="predictForm" class="form-grid">
        <div class="field">
          <label for="cgpa">CGPA</label>
          <div class="input-row">
            <span class="input-icon">GPA</span>
            <input type="number" id="cgpa" step="0.01" min="0" max="10" value="8.5" placeholder="0.00 – 10.00" required />
          </div>
        </div>

        <div class="field">
          <label for="iq">IQ Score</label>
          <div class="input-row">
            <span class="input-icon">IQ</span>
            <input type="number" id="iq" min="50" max="200" value="120" placeholder="50 – 200" required />
          </div>
        </div>

        <div class="field">
          <label for="profileScore">Profile Score</label>
          <div class="input-row">
            <span class="input-icon">PRF</span>
            <input type="number" id="profileScore" min="0" max="100" value="75" placeholder="0 – 100" required />
          </div>
        </div>

        <button class="btn-predict" type="submit" id="predictBtn">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
          Run Prediction
        </button>
      </form>

      <div class="result-box">
        <div class="result-icon">🎯</div>
        <div class="result-text-wrap">
          <span class="result-label">Prediction Result</span>
          <span id="predictionResult" class="state-waiting">Waiting for input…</span>
        </div>
      </div>
    </div>

    <p class="footer-note">
      Predictions are generated by your locally trained model via <code>/predict</code>
    </p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
